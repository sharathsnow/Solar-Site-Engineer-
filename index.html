<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Solar Material Calculator</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f6f8;
}

/* LOGIN */
#loginScreen{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#111,#333);
}

.login-box{
  background:#fff;
  padding:25px;
  width:300px;
  border-radius:10px;
  text-align:center;
}

.login-box input, .login-box button{
  width:100%;
  padding:12px;
  margin:10px 0;
}

/* APP */
#app{display:none}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  gap:10px;
  background:#111;
  color:#fff;
  padding:12px;
}

.menu-btn{
  font-size:22px;
  cursor:pointer;
}

.header img{height:36px}
.header h1{font-size:16px;margin:0;flex:1}

/* INFO */
.info-icon{
  width:26px;height:26px;
  border-radius:50%;
  background:#fff;
  color:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.info-popup{
  position:fixed;
  top:60px;
  right:12px;
  background:#fff;
  padding:14px;
  width:260px;
  border-radius:8px;
  display:none;
}

/* LAYOUT */
.container{
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:180px;
  background:#222;
  display:flex;
  flex-direction:column;
  transition:0.3s;
}

.sidebar button{
  padding:14px;
  border:none;
  background:#222;
  color:#fff;
  text-align:left;
}

.sidebar button.active{background:#007bff}

/* MOBILE SIDEBAR */
@media(max-width:768px){
  .sidebar{
    position:fixed;
    top:0;
    left:-220px;
    height:100%;
    width:200px;
    z-index:1000;
  }

  .sidebar.show{
    left:0;
  }

  .overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    display:none;
    z-index:999;
  }

  .overlay.show{
    display:block;
  }
}

/* CONTENT */
.content{flex:1;padding:15px}
.box{background:#fff;padding:15px;border-radius:8px}

button{padding:10px;margin-top:10px;width:100%}
input,select{width:100%;padding:10px;margin:8px 0}

.hidden{display:none}
.footer{text-align:center;padding:10px;font-size:12px}

/* BUTTON TYPES */
.table-btn{background:#e0e0e0}
.table-btn.active{background:#1976d2;color:#fff}

.mode-btn{background:#c8e6c9}
.mode-btn.active{background:#2e7d32;color:#fff}

.calculate-btn{
  background:#007bff;
  color:#fff;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h2>Solar Material Calculator</h2>
    <input type="password" id="passwordInput" placeholder="Enter Password">
    <button onclick="checkPassword()">Enter</button>
    <div id="loginError" style="color:red;display:none;">Incorrect password</div>
  </div>
</div>

<!-- APP -->
<div id="app">

<div class="header">
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <img src="IMG_4454.jpeg">
  <h1>Solar Tool</h1>
  <div class="info-icon" onclick="toggleInfo()">i</div>
</div>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<div class="container">

<div class="sidebar">
  <button class="active" onclick="showSection('mms',this)">MMS</button>
  <button onclick="showSection('piling',this)">Piling</button>
  <button onclick="showSection('module',this)">Module</button>
</div>

<div class="content">

<!-- MMS -->
<div id="mms" class="box">
  <input id="mmsTables" type="number" placeholder="No. of Tables">
  <button class="calculate-btn" onclick="calcMaterial()">Calculate</button>
  <div id="mmsResult"></div>
</div>

<!-- PILING -->
<div id="piling" class="box hidden">
  <input id="pileTables" type="number" placeholder="No. of Tables">
  <button class="calculate-btn" onclick="calcPiling()">Calculate</button>
  <div id="pileResult"></div>
</div>

<!-- MODULE -->
<div id="module" class="box hidden">
  <input id="fullTableCount" type="number" placeholder="Full Tables">
  <input id="halfTableCount" type="number" placeholder="Half Tables">
  <button class="calculate-btn" onclick="calcPallets()">Calculate</button>
  <div id="moduleResult"></div>
</div>

</div>
</div>

<div class="footer">Developed by Sharath</div>

</div>

<script>

function checkPassword(){
  if(passwordInput.value==="solar@123"){
    loginScreen.style.display="none";
    app.style.display="block";
  }else{
    loginError.style.display="block";
  }
}

function toggleMenu(){
  document.querySelector(".sidebar").classList.toggle("show");
  document.getElementById("overlay").classList.toggle("show");
}

function toggleInfo(){
  alert("Solar Site Tool");
}

function showSection(id,btn){
  document.querySelectorAll(".sidebar button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  document.querySelectorAll(".box").forEach(b=>b.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");

  document.querySelector(".sidebar").classList.remove("show");
  document.getElementById("overlay").classList.remove("show");
}

function calcMaterial(){
  let n = +mmsTables.value;
  mmsResult.innerHTML = "Material for "+n+" tables calculated";
}

function calcPiling(){
  let n = +pileTables.value;
  pileResult.innerHTML = "Posts: "+(n*12);
}

function calcPallets(){
  let full = +fullTableCount.value;
  let half = +halfTableCount.value;

  let total = (full*58)+(half*29);
  let pallets = Math.ceil(total/33);

  moduleResult.innerHTML = "Pallets: "+pallets;
}

</script>

</body>
</html>
