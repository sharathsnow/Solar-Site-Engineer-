<script>
let mmsTableType = 'full';
let pileTableType = 'full';

/* ✅ DATA ADDED */
const material={
  full:{Rafter:12,"Purlin 1":4,"Purlin 2":4,"Purlin 3":4,"Purlin 4":4,"Purlin 5":4,"Purlin 6":4,"Front Bracing":12,"Rear Bracing":12,"Connecting Channel":12,"Cross Bracing":2},
  half:{Rafter:7,"Purlin 7":4,"Purlin 8":4,"Purlin 9":4,"Front Bracing":7,"Rear Bracing":7,"Connecting Channel":7,"Cross Bracing":2}
};

const fastener={
  full:{
    "M12×30 Nut–Bolt":24,"M12×30 PW":48,"M12×30 SW":24,
    "M10×30 Nut–Bolt":324,"M10×30 PW":472,"M10×30 SW":324,"M10×30 RW":176,
    "M8×25 Nut-Bolt":232,"M8×25 RW":232
  },
  half:{
    "M12×30 Nut–Bolt":14,"M12×30 PW":28,"M12×30 SW":14,
    "M10×30 Nut–Bolt":176,"M10×30 PW":264,"M10×30 SW":176,"M10×30 RW":88,
    "M8×25 Nut-Bolt":116,"M8×25 RW":116
  }
};

function checkPassword(){
  if(passwordInput.value==="solar@123"){
    loginScreen.style.display="none";
    app.style.display="block";
    loadGallery();
    updateDropdowns(); // ✅ init dropdowns
  } else alert("Incorrect Password");
}

/* NAV */
function showSection(id,btn){
  document.querySelectorAll(".sidebar button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  document.querySelectorAll(".box").forEach(b=>b.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

function toggleMenu(){
  document.querySelector(".sidebar").classList.toggle("show");
  overlay.classList.toggle("show");
}

/* MMS */
function setMMSTable(type,btn){
  mmsTableType = type;
  document.querySelectorAll("#mms .table-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  updateDropdowns(); // ✅ refresh items
}

function showMMS(id,btn){
  document.querySelectorAll(".mode-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  ["t2m","m2t","t2f","f2t"].forEach(d=>document.getElementById(d).classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

/* ✅ TABLE → MATERIAL (UNCHANGED STYLE BUT DATA CORRECT) */
function calcMaterial(){
  let t = +mmsTables.value || 0;
  let data = material[mmsTableType];
  let html = `<b>Recon for ${t} ${mmsTableType} tables:</b><br>`;
  for(let k in data){
    html += `- ${k}: ${data[k]*t}<br>`;
  }
  mmsResult.innerHTML = html;
}

/* ✅ MAT → TABLE (DYNAMIC DROPDOWN) */
function materialToTable(){
  let q = +matQty.value || 0;
  let item = matType.value;
  let perTable = material[mmsTableType][item];

  let tables = Math.floor(q/perTable);
  let leftover = q%perTable;

  mmsResult2.innerHTML = `
    <b>${item}</b><br>
    Completed Tables: ${tables}<br>
    Leftover: ${leftover}
  `;
}

/* ✅ TABLE → FASTENER */
function calcFasteners(){
  let t = +fasTables.value || 0;
  let data = fastener[mmsTableType];
  let html = `<b>Fasteners Needed:</b><br>`;
  for(let k in data){
    html += `- ${k}: ${data[k]*t}<br>`;
  }
  fasResult.innerHTML = html;
}

/* ✅ FASTENER → TABLE */
function fastenerToTable(){
  let q = +fasQty.value || 0;
  let item = fasType.value;
  let perTable = fastener[mmsTableType][item];

  let tables = Math.floor(q/perTable);
  let leftover = q%perTable;

  fasResult2.innerHTML = `
    <b>${item}</b><br>
    Coverage: ${tables} Tables<br>
    Remaining: ${leftover}
  `;
}

/* ✅ DROPDOWN FIX */
function updateDropdowns(){
  let matSel = document.getElementById("matType");
  let fasSel = document.getElementById("fasType");

  if(matSel){
    matSel.innerHTML="";
    for(let k in material[mmsTableType]){
      matSel.innerHTML += `<option value="${k}">${k}</option>`;
    }
  }

  if(fasSel){
    fasSel.innerHTML="";
    for(let k in fastener[mmsTableType]){
      fasSel.innerHTML += `<option value="${k}">${k}</option>`;
    }
  }
}

/* PILING */
function setPileTable(type,btn){
  pileTableType = type;
  document.querySelectorAll("#piling .table-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

function calcPiling(){
  let t = +pileTables.value || 0;
  let piles = t*2;
  pileResult.innerHTML = `
  <b>Data for ${t} Tables:</b><br>
  - Total Piles: ${piles}<br>
  - Concrete: ${(piles*0.08).toFixed(2)} m³`;
}

/* MODULE (FIXED) */
function calcPallets(){
  let f = +fullTableCount.value || 0;
  let h = +halfTableCount.value || 0;

  let total = (f*58) + (h*29); // ✅ FIXED

  let pallets = Math.ceil(total/33);
  let leftover = (pallets*33) - total;

  moduleResult.innerHTML = `
  <b>Site Summary:</b><br>
  - Total Modules: ${total}<br>
  - Pallets Required: ${pallets}<br>
  - Modules Left: ${leftover}`;
}

/* STRING */
function calcStringInv(){
  let m = +totalModules.value || 0;
  let s = +modulesPerString.value || 1;
  let i = +stringMode.value || 1;

  let ts = Math.floor(m/s);

  stringResult.innerHTML = `
  <b>DC Electrical:</b><br>
  - Strings: ${ts}<br>
  - Inverters: ${Math.ceil(ts/i)}`;
}

/* GALLERY */
const drawings=[
  {title:"MMS Structure",src:"drawing1.jpg"},
  {title:"Foundation",src:"drawing2.jpg"}
];

function loadGallery(){
  artGrid.innerHTML = drawings.map(d=>`
  <div class="art-card">
    <img src="${d.src}" onerror="this.src='https://via.placeholder.com/150'">
    <p>${d.title}</p>
  </div>`).join('');
}
</script>
