<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Solar Infra Utility - Sharath</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f4f6f8;color:#333}
#loginScreen{height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#111,#333)}
.login-box{background:#fff;padding:25px;width:300px;border-radius:10px;text-align:center;box-shadow:0 10px 25px rgba(0,0,0,0.5)}
.login-box input,.login-box button{width:100%;padding:12px;margin:10px 0;border-radius:5px;border:1px solid #ccc;box-sizing:border-box}
.login-box button{background:#007bff;color:#fff;border:none;font-weight:bold;cursor:pointer}
#app{display:none}
.header{display:flex;align-items:center;gap:10px;background:#111;color:#fff;padding:12px;position:sticky;top:0;z-index:100}
.header img{height:36px;border-radius:4px}
.header h1{font-size:15px;margin:0;flex:1}
.container{display:flex}
.sidebar{width:180px;background:#222;height:calc(100vh - 60px);display:flex;flex-direction:column;transition:0.3s;position:sticky;top:60px}
.sidebar button{padding:14px;border:none;background:#222;color:#fff;text-align:left;cursor:pointer;border-bottom:1px solid #333}
.sidebar button.active{background:#007bff}
.content{flex:1;padding:15px;max-width:100%}
.box{background:#fff;padding:15px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.05);margin-bottom:20px}
.hidden{display:none}
.tabs,.subtabs{display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap}
button{padding:10px;width:100%;margin-top:8px;cursor:pointer;border-radius:4px;border:none;transition:0.2s}
input,select{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:4px;box-sizing:border-box}
.table-btn{background:#e0e0e0}
.table-btn.active{background:#1976d2;color:#fff}
.mode-btn{background:#c8e6c9}
.mode-btn.active{background:#2e7d32;color:#fff}
.calculate-btn{background:#007bff;color:#fff;font-weight:bold;font-size:16px}
.result-area{background:#f0f7ff;padding:12px;border-left:4px solid #007bff;margin-top:10px;font-size:14px;line-height:1.6;color:#004085}
.art-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:15px}
.art-card{background:#fff;border:1px solid #eee;border-radius:8px;overflow:hidden;text-align:center;padding:5px}
.art-card img{width:100%;height:120px;object-fit:cover;border-radius:4px}
@media(max-width:768px){.sidebar{position:fixed;top:60px;left:-220px;height:100%;width:200px;z-index:1000}.sidebar.show{left:0}.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;z-index:999}.overlay.show{display:block}}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <h2>Amararaja Solar Infra</h2>
    <input type="password" id="passwordInput" placeholder="Enter Password">
    <button onclick="checkPassword()">Log In</button>
  </div>
</div>

<div id="app">
  <div class="header">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <img src="IMG_4454.jpeg" alt="Logo">
    <h1>Site Utility Tool</h1>
  </div>

  <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

  <div class="container">
    <div class="sidebar">
      <button class="active" onclick="showSection('mms',this)">🏗️ MMS Recon</button>
      <button onclick="showSection('piling',this)">🚧 Piling</button>
      <button onclick="showSection('module',this)">☀️ Module/Pallet</button>
      <button onclick="showSection('stringcalc',this)">🔌 String Calc</button>
      <button onclick="showSection('gallery',this)">🎨 My Drawings</button>
    </div>

    <div class="content">
      <div id="mms" class="box">
        <div class="tabs">
          <button class="table-btn active" onclick="setMMSTable('full',this)">Full Table (2x29)</button>
          <button class="table-btn" onclick="setMMSTable('half',this)">Half Table (2x15)</button>
        </div>
        <div class="subtabs">
          <button class="mode-btn active" onclick="showMMS('t2m',this)">Table→Mat</button>
          <button class="mode-btn" onclick="showMMS('m2t',this)">Mat→Table</button>
          <button class="mode-btn" onclick="showMMS('t2f',this)">Table→Fast</button>
          <button class="mode-btn" onclick="showMMS('f2t',this)">Fast→Table</button>
        </div>

        <div id="t2m">
          <input id="mmsTables" type="number" placeholder="Enter Number of Tables">
          <button class="calculate-btn" onclick="calcMaterial()">Calculate Materials</button>
          <div id="mmsResult" class="result-area"></div>
        </div>

        <div id="m2t" class="hidden">
          <select id="matType">
            <option value="purlin">Purlins</option>
            <option value="rafter">Rafters</option>
            <option value="post">Posts</option>
          </select>
          <input id="matQty" type="number" placeholder="Material Quantity Found">
          <button class="calculate-btn" onclick="materialToTable()">Calculate Tables</button>
          <div id="mmsResult2" class="result-area"></div>
        </div>

        <div id="t2f" class="hidden">
          <input id="fasTables" type="number" placeholder="Enter Tables">
          <button class="calculate-btn" onclick="calcFasteners()">Calculate Fasteners</button>
          <div id="fasResult" class="result-area"></div>
        </div>

        <div id="f2t" class="hidden">
          <select id="fasType">
            <option value="28">M12x35 (28/Table)</option>
            <option value="56">M10x30 (56/Table)</option>
            <option value="84">Washers (84/Table)</option>
          </select>
          <input id="fasQty" type="number" placeholder="Fastener Count Found">
          <button class="calculate-btn" onclick="fastenerToTable()">Calculate Coverage</button>
          <div id="fasResult2" class="result-area"></div>
        </div>
      </div>

      <div id="piling" class="box hidden">
        <div class="tabs">
          <button class="table-btn active" onclick="setPileTable('full',this)">Full Table (2 Piles)</button>
          <button class="table-btn" onclick="setPileTable('half',this)">Half Table (2 Piles)</button>
        </div>
        <input id="pileTables" type="number" placeholder="Enter Number of Tables">
        <button class="calculate-btn" onclick="calcPiling()">Calculate Piling</button>
        <div id="pileResult" class="result-area"></div>
      </div>

      <div id="module" class="box hidden">
        <h3>Pallet Reconciliation (33 Mods/Pallet)</h3>
        <input id="fullTableCount" type="number" placeholder="Full Tables (58 modules)">
        <input id="halfTableCount" type="number" placeholder="Half Tables (30 modules)">
        <button class="calculate-btn" onclick="calcPallets()">Calculate Modules/Pallets</button>
        <div id="moduleResult" class="result-area"></div>
      </div>

      <div id="stringcalc" class="box hidden">
        <input type="number" id="totalModules" placeholder="Total Modules">
        <input type="number" id="modulesPerString" value="29">
        <select id="stringMode"><option value="18">18 Str/Inv</option><option value="19">19 Str/Inv</option></select>
        <button class="calculate-btn" onclick="calcStringInv()">Calculate Strings</button>
        <div id="stringResult" class="result-area"></div>
      </div>

      <div id="gallery" class="box hidden">
        <h3>Site Approved Drawings</h3>
        <div id="artGrid" class="art-grid"></div>
        <hr><div style="text-align:center;"><a href="https://github.com/sharathsnow" target="_blank" style="color:#007bff;text-decoration:none;font-weight:bold">🔗 Visit My GitHub Profile</a></div>
      </div>
    </div>
  </div>
</div>

<script>
let mmsTableType = 'full';
let pileTableType = 'full';

function checkPassword(){
  if(document.getElementById("passwordInput").value === "solar@123"){
    document.getElementById("loginScreen").style.display="none";
    document.getElementById("app").style.display="block";
    loadGallery();
  } else { alert("Incorrect Password"); }
}

function showSection(id,btn){
  document.querySelectorAll(".sidebar button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  document.querySelectorAll(".box").forEach(b=>b.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

function toggleMenu(){ document.querySelector(".sidebar").classList.toggle("show"); document.getElementById("overlay").classList.toggle("show"); }

/* MMS LOGIC */
function setMMSTable(type,btn){
  mmsTableType = type;
  document.querySelectorAll("#mms .table-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

function showMMS(id,btn){
  document.querySelectorAll(".mode-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  ["t2m","m2t","t2f","f2t"].forEach(div => document.getElementById(div).classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

function calcMaterial(){
  let t = +mmsTables.value, p = mmsTableType==='full'?14:7;
  mmsResult.innerHTML = `<b>Recon for ${t} ${mmsTableType} tables:</b><br>
  - Purlins: ${t*p}<br>
  - Rafters: ${t*2}<br>
  - Posts: ${t*2}<br>
  - Bracings: ${t*4} (2 Front, 2 Rear)`;
}

function materialToTable(){
  let q = +matQty.value, type = matType.value;
  let r = (type==='purlin') ? (mmsTableType==='full'?14:7) : 2;
  mmsResult2.innerHTML = `<b>Completed ${mmsTableType} Tables:</b> ${Math.floor(q/r)}<br>Loose Components: ${q%r}`;
}

function calcFasteners(){
  let t = +fasTables.value;
  fasResult.innerHTML = `<b>Fasteners Needed:</b><br>
  - M12x35: ${t*28}<br>
  - M10x30: ${t*56}<br>
  - Plain Washers: ${t*168}<br>
  - Spring Washers: ${t*84}`;
}

function fastenerToTable(){
  let q = +fasQty.value, r = +fasType.value;
  fasResult2.innerHTML = `<b>Coverage:</b> ${Math.floor(q/r)} Tables<br>Spare Bolts: ${q%r}`;
}

/* PILING LOGIC */
function setPileTable(type,btn){
  pileTableType = type;
  document.querySelectorAll("#piling .table-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

function calcPiling(){
  let t = +pileTables.value;
  let piles = t * 2; 
  pileResult.innerHTML = `<b>Data for ${t} Tables:</b><br>
  - Total Piles: ${piles}<br>
  - Concrete Volume (0.08m³ avg): ${(piles*0.08).toFixed(2)} m³<br>
  - Post Erection: ${piles} Posts`;
}

/* MODULE LOGIC */
function calcPallets(){
  let f = +fullTableCount.value, h = +halfTableCount.value;
  let total = (f*58) + (h*30);
  moduleResult.innerHTML = `<b>Site Summary:</b><br>
  - Total Modules: ${total}<br>
  - Pallets (33/pallet): ${Math.ceil(total/33)}<br>
  - Remainder: ${total%33} modules`;
}

/* STRING CALC */
function calcStringInv(){
  let m = +totalModules.value, s = +modulesPerString.value, i = +stringMode.value;
  let ts = Math.floor(m/s);
  stringResult.innerHTML = `<b>DC Electrical:</b><br>
  - Total Strings: ${ts}<br>
  - Total Inverters: ${Math.ceil(ts/i)}<br>
  - String Balance: ${ts%i || i} on last Inverter`;
}

/* GALLERY - Add your 50 drawings here */
const drawings = [
  {title:"MMS Structure", src:"drawing1.jpg"},
  {title:"Foundation Detail", src:"drawing2.jpg"},
  {title:"Module Layout", src:"drawing3.jpg"}
];

function loadGallery(){
  const grid = document.getElementById('artGrid');
  grid.innerHTML = drawings.map(art => `<div class="art-card">
    <img src="${art.src}" onerror="this.src='https://via.placeholder.com/150?text=Drawing'" onclick="window.open(this.src)">
    <p style="font-size:11px">${art.title}</p>
  </div>`).join('');
}
</script>
</body>
</html>
