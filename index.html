<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar Calculator</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* Sidebar */
.sidebar {
  width: 230px;
  height: 100vh;
  background: #1e293b;
  color: white;
  position: fixed;
  padding-top: 20px;
}

.sidebar h2 {
  text-align: center;
}

.sidebar a {
  display: block;
  padding: 12px;
  color: white;
  cursor: pointer;
}

.sidebar a:hover {
  background: #334155;
}

/* Content */
.content {
  margin-left: 230px;
  padding: 20px;
}

/* Sections */
.section {
  display: none;
}

.section.active {
  display: block;
}

/* Input styling */
input {
  padding: 8px;
  margin: 5px;
  width: 150px;
}

button {
  padding: 8px 12px;
  margin: 5px;
  cursor: pointer;
}

/* Mobile Button */
.menu-btn {
  display: none;
  position: fixed;
  top: 10px;
  left: 10px;
  background: #1e293b;
  color: white;
  border: none;
  padding: 10px;
  font-size: 18px;
}

/* Mobile View */
@media (max-width: 768px) {
  .sidebar {
    display: none;
  }
  .content {
    margin-left: 0;
  }
  .menu-btn {
    display: block;
  }
}
</style>
</head>

<body>

<!-- Mobile Menu Button -->
<button class="menu-btn" onclick="toggleMenu()">☰</button>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
  <h2>Solar Tool</h2>
  <a onclick="showSection('tables')">Tables</a>
  <a onclick="showSection('strings')">Strings</a>
  <a onclick="showSection('mw')">MW Calc</a>
  <a onclick="showSection('inverter')">Inverter</a>
</div>

<!-- Content -->
<div class="content">

<!-- Tables -->
<div id="tables" class="section active">
  <h2>Tables Calculator</h2>

  <input type="number" id="tablesInput" placeholder="No. of Tables">
  <button onclick="calcModules()">Calculate Modules</button>

  <p id="modulesResult"></p>
</div>

<!-- Strings -->
<div id="strings" class="section">
  <h2>String Calculator</h2>

  <input type="number" id="stringsInput" placeholder="No. of Strings">
  <button onclick="calcTables()">Calculate Tables</button>

  <p id="tablesResult"></p>
</div>

<!-- MW -->
<div id="mw" class="section">
  <h2>MW Calculator</h2>

  <input type="number" id="mwTables" placeholder="No. of Tables">
  <button onclick="calcMW()">Calculate MW</button>

  <p id="mwResult"></p>
</div>

<!-- Inverter -->
<div id="inverter" class="section">
  <h2>Inverter Calculator</h2>

  <input type="number" id="invCount" placeholder="No. of Inverters">
  <button onclick="calcCapacity()">Calculate Capacity</button>

  <p id="invResult"></p>
</div>

</div>

<script>

/* Navigation */
function showSection(id) {
  let sections = document.querySelectorAll('.section');
  sections.forEach(sec => sec.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* Mobile Menu */
function toggleMenu() {
  let sidebar = document.getElementById('sidebar');
  sidebar.style.display =
    sidebar.style.display === 'block' ? 'none' : 'block';
}

/* Tables → Modules */
function calcModules() {
  let tables = document.getElementById('tablesInput').value;
  let modules = tables * 58;
  document.getElementById('modulesResult').innerText =
    "Modules: " + modules;
}

/* Strings → Tables */
function calcTables() {
  let strings = document.getElementById('stringsInput').value;
  let tables = strings / 2;
  document.getElementById('tablesResult').innerText =
    "Tables: " + tables;
}

/* Tables → MW */
function calcMW() {
  let tables = document.getElementById('mwTables').value;
  let mw = tables * 0.041;
  document.getElementById('mwResult').innerText =
    "DC Capacity: " + mw.toFixed(2) + " MW";
}

/* Inverter → MW */
function calcCapacity() {
  let inv = document.getElementById('invCount').value;
  let mw = inv * 0.39;
  document.getElementById('invResult').innerText =
    "Total DC Capacity: " + mw.toFixed(2) + " MW";
}

</script>

</body>
</html>
