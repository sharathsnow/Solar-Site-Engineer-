<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar Site Engineer Tool</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* Top bar */
.topbar {
  background: #2c3e50;
  color: white;
  padding: 12px;
  display: flex;
  align-items: center;
}

.menu-btn {
  font-size: 20px;
  margin-right: 15px;
  cursor: pointer;
}

/* Sidebar */
.sidebar {
  position: fixed;
  top: 0;
  left: -250px;
  width: 220px;
  height: 100%;
  background: #34495e;
  padding-top: 50px;
  transition: 0.3s;
}

.sidebar a {
  display: block;
  color: white;
  padding: 12px;
  text-decoration: none;
}

.sidebar a:hover {
  background: #2c3e50;
}

/* Content */
.content {
  padding: 15px;
}

/* Sections */
.section {
  display: none;
}

.section.active {
  display: block;
}

/* Buttons */
button {
  padding: 10px;
  margin-top: 10px;
  width: 100%;
}

/* Input */
input {
  padding: 10px;
  width: 100%;
  margin-top: 10px;
}
</style>
</head>

<body>

<!-- Top bar -->
<div class="topbar">
  <span class="menu-btn" onclick="toggleMenu()">☰</span>
  <h3>Solar Tool</h3>
</div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
  <a onclick="showSection('home')">Home</a>
  <a onclick="showSection('mw')">MW Calculator</a>
  <a onclick="showSection('tables')">Tables</a>
  <a onclick="showSection('strings')">Strings</a>
</div>

<!-- Content -->
<div class="content">

  <div id="home" class="section active">
    <h2>Welcome</h2>
    <p>Solar Site Engineer Tool</p>
  </div>

  <div id="mw" class="section">
    <h2>MW Calculator</h2>
    <input type="number" id="modules" placeholder="No. of Modules">
    <input type="number" id="watt" placeholder="Module Watt (Wp)">
    <button onclick="calcMW()">Calculate</button>
    <p id="mwResult"></p>
  </div>

  <div id="tables" class="section">
    <h2>Tables</h2>
    <p>1 Table = 58 Modules</p>
  </div>

  <div id="strings" class="section">
    <h2>Strings</h2>
    <p>1 String = 29 Modules</p>
  </div>

</div>

<script>

function toggleMenu() {
  let sidebar = document.getElementById("sidebar");
  if (sidebar.style.left === "0px") {
    sidebar.style.left = "-250px";
  } else {
    sidebar.style.left = "0px";
  }
}

function showSection(id) {
  let sections = document.querySelectorAll(".section");
  sections.forEach(sec => sec.classList.remove("active"));

  document.getElementById(id).classList.add("active");

  // Auto close menu on mobile
  document.getElementById("sidebar").style.left = "-250px";
}

function calcMW() {
  let modules = document.getElementById("modules").value;
  let watt = document.getElementById("watt").value;

  let dc = (modules * watt) / 1000000;
  let ac = dc / 1.4;

  document.getElementById("mwResult").innerHTML =
    "DC: " + dc.toFixed(3) + " MW <br> AC: " + ac.toFixed(3) + " MW";
}

</script>

</body>
</html>
