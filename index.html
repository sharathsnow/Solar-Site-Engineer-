<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Solar Material Calculator</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f6f8;
}

/* LOGIN */
#loginScreen{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#111,#333);
}

.login-box{
  background:#fff;
  padding:25px;
  width:300px;
  border-radius:10px;
  text-align:center;
}

.login-box input,.login-box button{
  width:100%;
  padding:12px;
  margin:10px 0;
}

/* APP */
#app{display:none}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  gap:10px;
  background:#111;
  color:#fff;
  padding:12px;
}

.menu-btn{
  font-size:22px;
  cursor:pointer;
}

.header img{height:36px}
.header h1{font-size:15px;margin:0;flex:1}

/* INFO */
.info-icon{
  width:26px;height:26px;
  border-radius:50%;
  background:#fff;
  color:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.info-popup{
  position:fixed;
  top:60px;
  right:12px;
  background:#fff;
  padding:14px;
  width:260px;
  border-radius:8px;
  display:none;
  z-index:999;
}

/* LAYOUT */
.container{
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:180px;
  background:#222;
  display:flex;
  flex-direction:column;
  transition:0.3s;
}

.sidebar button{
  padding:14px;
  border:none;
  background:#222;
  color:#fff;
  text-align:left;
  cursor:pointer;
}

.sidebar button.active{background:#007bff}

/* MOBILE */
@media(max-width:768px){
  .sidebar{
    position:fixed;
    top:0;
    left:-220px;
    height:100%;
    width:200px;
    z-index:1000;
  }

  .sidebar.show{left:0}

  .overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    display:none;
    z-index:999;
  }

  .overlay.show{display:block}
}

/* CONTENT */
.content{flex:1;padding:15px}
.box{background:#fff;padding:15px;border-radius:8px}
.tabs,.subtabs{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}

button{padding:10px;width:100%;margin-top:8px;cursor:pointer}
input,select{width:100%;padding:10px;margin:8px 0}

.hidden{display:none}

.table-btn{background:#e0e0e0}
.table-btn.active{background:#1976d2;color:#fff}

.mode-btn{background:#c8e6c9}
.mode-btn.active{background:#2e7d32;color:#fff}

.calculate-btn{
  background:#007bff;
  color:#fff;
  font-weight:bold;
}

.footer{text-align:center;padding:10px;font-size:12px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h2>Solar Material Calculator</h2>
    <input type="password" id="passwordInput" placeholder="Enter Password">
    <button onclick="checkPassword()">Enter</button>
    <div id="loginError" style="color:red;display:none;">Incorrect password</div>
  </div>
</div>

<!-- APP -->
<div id="app">

<div class="header">
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <img src="IMG_4454.jpeg">
  <h1>Amararaja Solar Infra</h1>
  <div class="info-icon" onclick="toggleInfo()">i</div>
</div>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<div class="info-popup" id="info">
<b>Internal Utility Tool</b><br><br>
Developed by <b>Sharath</b>
</div>

<div class="container">

<div class="sidebar">
  <button class="active" onclick="showSection('mms',this)">MMS</button>
  <button onclick="showSection('piling',this)">Piling</button>
  <button onclick="showSection('module',this)">Module</button>
</div>

<div class="content">

<!-- MMS -->
<div id="mms" class="box">
  <div class="tabs">
    <button class="table-btn active" onclick="setMMSTable('full',this)">Full</button>
    <button class="table-btn" onclick="setMMSTable('half',this)">Half</button>
  </div>

  <div class="subtabs">
    <button class="mode-btn active" onclick="showMMS('t2m',this)">Table→Mat</button>
    <button class="mode-btn" onclick="showMMS('m2t',this)">Mat→Table</button>
    <button class="mode-btn" onclick="showMMS('t2f',this)">Table→Fast</button>
    <button class="mode-btn" onclick="showMMS('f2t',this)">Fast→Table</button>
  </div>

  <div id="t2m">
    <input id="mmsTables" type="number" placeholder="Tables">
    <button class="calculate-btn" onclick="calcMaterial()">Calculate</button>
    <div id="mmsResult"></div>
  </div>

  <div id="m2t" class="hidden">
    <select id="matType"></select>
    <input id="matQty" type="number">
    <button class="calculate-btn" onclick="materialToTable()">Calculate</button>
    <div id="mmsResult2"></div>
  </div>

  <div id="t2f" class="hidden">
    <input id="fasTables" type="number">
    <button class="calculate-btn" onclick="calcFasteners()">Calculate</button>
    <div id="fasResult"></div>
  </div>

  <div id="f2t" class="hidden">
    <select id="fasType"></select>
    <input id="fasQty" type="number">
    <button class="calculate-btn" onclick="fastenerToTable()">Calculate</button>
    <div id="fasResult2"></div>
  </div>
</div>

<!-- PILING -->
<div id="piling" class="box hidden">
  <input id="pileTables" type="number" placeholder="Tables">
  <button class="calculate-btn" onclick="calcPiling()">Calculate</button>
  <div id="pileResult"></div>
</div>

<!-- MODULE -->
<div id="module" class="box hidden">
  <input id="fullTableCount" type="number" placeholder="Full Tables">
  <input id="halfTableCount" type="number" placeholder="Half Tables">
  <button class="calculate-btn" onclick="calcPallets()">Calculate</button>
  <div id="moduleResult"></div>
</div>

</div>
</div>

<div class="footer">Developed by Sharath</div>

</div>

<script>

/* LOGIN */
function checkPassword(){
  if(passwordInput.value==="solar@123"){
    loginScreen.style.display="none";
    app.style.display="block";
  }else{
    loginError.style.display="block";
  }
}

/* MENU */
function toggleMenu(){
  document.querySelector(".sidebar").classList.toggle("show");
  overlay.classList.toggle("show");
}

/* INFO */
function toggleInfo(){
  info.style.display = info.style.display==="block"?"none":"block";
}

/* SECTION */
function showSection(id,btn){
  document.querySelectorAll(".sidebar button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  document.querySelectorAll(".box").forEach(b=>b.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");

  document.querySelector(".sidebar").classList.remove("show");
  overlay.classList.remove("show");
}

/* MMS LOGIC */
let mmsType="full";

const material={
  full:{Rafter:12,"Purlin":24,"Bracing":24},
  half:{Rafter:7,"Purlin":12,"Bracing":14}
};

const fastener={
  full:{"Bolt":300,"Nut":300},
  half:{"Bolt":150,"Nut":150}
};

function setMMSTable(t,btn){
  mmsType=t;
  btn.parentElement.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  loadDropdowns();
}

function showMMS(id,btn){
  btn.parentElement.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  ["t2m","m2t","t2f","f2t"].forEach(x=>{
    document.getElementById(x).classList.toggle("hidden",x!==id);
  });
}

function loadDropdowns(){
  matType.innerHTML="";
  for(let k in material[mmsType]) matType.innerHTML+=`<option>${k}</option>`;
  fasType.innerHTML="";
  for(let k in fastener[mmsType]) fasType.innerHTML+=`<option>${k}</option>`;
}
loadDropdowns();

function calcMaterial(){
  let n=+mmsTables.value;
  let out="";
  for(let k in material[mmsType]) out+=`${k}: ${material[mmsType][k]*n}<br>`;
  mmsResult.innerHTML=out;
}

function materialToTable(){
  let q=+matQty.value,t=matType.value;
  mmsResult2.innerHTML="Tables: "+Math.floor(q/material[mmsType][t]);
}

function calcFasteners(){
  let n=+fasTables.value;
  let out="";
  for(let k in fastener[mmsType]) out+=`${k}: ${fastener[mmsType][k]*n}<br>`;
  fasResult.innerHTML=out;
}

function fastenerToTable(){
  let q=+fasQty.value,t=fasType.value;
  fasResult2.innerHTML="Tables: "+Math.floor(q/fastener[mmsType][t]);
}

/* PILING */
function calcPiling(){
  let n=+pileTables.value;
  pileResult.innerHTML="Posts: "+(n*12);
}

/* MODULE */
function calcPallets(){
  let full=+fullTableCount.value||0;
  let half=+halfTableCount.value||0;

  let total=(full*58)+(half*29);
  let pallets=Math.ceil(total/33);

  moduleResult.innerHTML=`Total Modules: ${total}<br>Pallets: ${pallets}`;
}

</script>

</body>
</html>
